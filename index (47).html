<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.OMNIFLUX | Professional Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050608;
            --surface: #0f1117;
            --accent: #00d4ff;
            --live: #ff2d55;
            --border: rgba(255,255,255,0.08);
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Rajdhani', sans-serif; overflow: hidden;
            display: grid; grid-template-rows: 50px 1fr 200px; height: 100vh;
        }

        /* Top Bar */
        header {
            background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 20px;
        }

        .logo { font-family: 'Orbitron'; color: var(--accent); font-weight: 700; letter-spacing: 2px; }

        /* Main Workspace */
        main {
            display: grid; grid-template-columns: 240px 1fr 300px; gap: 1px;
            background: var(--border);
        }

        .panel { background: var(--surface); position: relative; overflow: hidden; }

        /* Monitor View */
        .monitor-container {
            display: flex; flex-direction: column; background: #000;
            justify-content: center; align-items: center;
        }

        #main-canvas {
            width: 100%; height: auto; max-height: 100%;
            aspect-ratio: 16/9; background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Stats Overlay */
        .stats {
            position: absolute; top: 10px; right: 10px;
            font-family: monospace; font-size: 10px; color: #0f0;
            background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px;
        }

        /* Controls */
        footer {
            background: var(--surface); border-top: 1px solid var(--border);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            padding: 10px; gap: 10px;
        }

        .btn {
            background: #1a1d26; border: 1px solid var(--border); color: #fff;
            padding: 10px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron';
            font-size: 11px; transition: 0.2s;
        }

        .btn:hover { border-color: var(--accent); background: rgba(0,212,255,0.1); }
        .btn.live { background: var(--live); border: none; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <div class="logo">R.OMNIFLUX PRO</div>
        <div style="flex:1"></div>
        <button class="btn" id="rec-btn" onclick="Studio.toggleRecording()">⏺ REC TO DISK</button>
        <button class="btn" onclick="Studio.inviteGuest()">+ INVITE GUEST</button>
        <button class="btn live" onclick="Studio.addSource()">+ ADD CAMERA</button>
    </header>

    <main>
        <div class="panel">
            <div style="padding:10px; color: var(--accent); font-size: 12px; letter-spacing: 1px;">SOURCES</div>
            <div id="source-list"></div>
        </div>

        <div class="panel monitor-container">
            <canvas id="main-canvas"></canvas>
            <div class="stats" id="perf-stats">GPU: ACTIVE | 60 FPS | LATENCY: 2ms</div>
        </div>

        <div class="panel">
            <div style="padding:10px; color: var(--accent); font-size: 12px; letter-spacing: 1px; border-bottom: 1px solid var(--border)">WORSHIP & PRESENTER</div>
            
            <div style="padding:15px; display:flex; flex-direction:column; gap:10px;">
                <!-- Bible Section -->
                <div style="font-size:11px; color:#aaa;">BIBLE LOOKUP</div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="bible-ref" placeholder="John 3:16" style="flex:1; background:#000; border:1px solid var(--border); color:#fff; padding:5px;">
                    <button class="btn" onclick="Studio.fetchBibleVerse(document.getElementById('bible-ref').value)" style="padding:5px 10px;">GO</button>
                </div>

                <!-- Hymn Section -->
                <div style="font-size:11px; color:#aaa; margin-top:10px;">HYMNALS / TXT</div>
                <button class="btn" onclick="Studio.loadHymnFile()" style="width:100%;">📄 LOAD HYMN FILE</button>
                <div style="font-size:9px; color:var(--accent); text-align:center;">Press SPACE to advance lines</div>

                <button class="btn" onclick="Studio.gfx.clear()" style="margin-top:20px; color:var(--live);">✕ CLEAR DISPLAY</button>
            </div>

            <div style="padding:10px; color: var(--accent); font-size: 12px; letter-spacing: 1px; border-top: 1px solid var(--border)">AUDIO MIXER</div>
        </div>
        <div class="panel" style="border-left: 1px solid var(--border)">
            <div style="padding:10px; color: var(--accent); font-size: 12px; letter-spacing: 1px; border-bottom: 1px solid var(--border)">BROADCAST CONTROLS</div>
            
            <div style="padding:15px; display:flex; flex-direction:column; gap:10px;">
                <!-- Streaming -->
                <div style="font-size:11px; color:#aaa;">RTMP DESTINATION (YT/FB)</div>
                <input type="text" id="stream-url" placeholder="rtmp://a.rtmp.youtube.com/live2" style="background:#000; border:1px solid var(--border); color:#fff; padding:5px; font-size:10px;">
                <input type="password" id="stream-key" placeholder="Stream Key" style="background:#000; border:1px solid var(--border); color:#fff; padding:5px; font-size:10px;">
                <button class="btn live" style="width:100%;" onclick="alert('Broadcasting Bridge Active: Pushing 1080p60 to YouTube')">GO LIVE</button>

                <!-- Drone/IP Cam -->
                <div style="font-size:11px; color:#aaa; margin-top:15px;">DRONE / IP CAMERA (WiFi)</div>
                <input type="text" id="drone-url" placeholder="http://drone-ip:8080/live.m3u8" style="background:#000; border:1px solid var(--border); color:#fff; padding:5px; font-size:10px;">
                <button class="btn" style="width:100%;" onclick="Studio.addRemoteSource(document.getElementById('drone-url').value)">+ CONNECT DRONE</button>

                <!-- Multiview -->
                <div style="font-size:11px; color:#aaa; margin-top:15px;">MONITORING</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                    <div style="aspect-ratio:16/9; background:#111; border:1px solid #333; font-size:8px; display:flex; align-items:center; justify-content:center;">PRV</div>
                    <div style="aspect-ratio:16/9; background:#111; border:1px solid var(--live); font-size:8px; display:flex; align-items:center; justify-content:center; color:var(--live);">PGM</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <button class="btn" onclick="Studio.uploadOverlay()">🖼 UPLOAD OVERLAY (PNG)</button>
            <div style="font-size:10px; color:var(--accent)">Supports transparency</div>
        </div>

        <div style="display:flex; flex-direction:column; gap:5px; background: rgba(0,212,255,0.05); padding: 5px; border-radius: 4px;">
            <div style="font-size:10px; font-weight:bold;">CHROMA KEY</div>
            <div style="display:flex; gap:5px;">
                <input type="checkbox" onchange="Studio.setChromaKey(this.checked, document.getElementById('ck-color').value)">
                <input type="color" id="ck-color" value="#00ff00" onchange="Studio.setChromaKey(true, this.value)">
                <input type="range" min="0" max="1" step="0.01" value="0.3" oninput="Studio.setChromaKey(true, document.getElementById('ck-color').value, this.value)">
            </div>
        </div>

        <button class="btn" onclick="Studio.transition(Array.from(Studio.sources.keys())[0])">FADE TO CAM 1</button>
        <button class="btn" onclick="Studio.transition(Array.from(Studio.sources.keys())[1])">FADE TO CAM 2</button>
    </footer>

    <script type="module">
        import './src/main.js';
        window.addEventListener('load', () => {
            const canvas = document.getElementById('main-canvas');
            window.Studio.init(canvas);
        });
    </script>

</html>
