<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.OMNIFLUX PRO | Church Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050608; --surface: #0f1117; --accent: #00d4ff; --live: #ff2d55; --border: rgba(255,255,255,0.08); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; display: grid; grid-template-rows: 50px 1fr 200px; height: 100vh; }
        header { background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-weight: 700; letter-spacing: 2px; }
        main { display: grid; grid-template-columns: 240px 1fr 300px; gap: 1px; background: var(--border); }
        .panel { background: var(--surface); position: relative; overflow: hidden; }
        .monitor-container { display: flex; flex-direction: column; background: #000; justify-content: center; align-items: center; }
        #main-canvas { width: 100%; height: auto; aspect-ratio: 16/9; background: #000; }
        .stats { position: absolute; top: 10px; right: 10px; font-family: monospace; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; }
        footer { background: var(--surface); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px; gap: 10px; }
        .btn { background: #1a1d26; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; transition: 0.2s; }
        .btn:hover { border-color: var(--accent); background: rgba(0,212,255,0.1); }
        .btn.live { background: var(--live); border: none; font-weight: bold; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <header>
        <div class="logo">R.OMNIFLUX PRO</div>
        <div style="flex:1"></div>
        <button class="btn" id="rec-btn" onclick="Studio.toggleRecording()">⏺ REC TO DISK</button>
        <button class="btn live" onclick="Studio.addSource()">+ ADD CAMERA</button>
    </header>

    <main>
        <div class="panel">
            <div style="padding:10px; color: var(--accent); font-size: 12px;">SOURCES</div>
            <div id="source-list"></div>
        </div>

        <div class="panel monitor-container">
            <canvas id="main-canvas"></canvas>
            <div class="stats" id="perf-stats">GPU: ACTIVE | 60 FPS</div>
        </div>

        <div class="panel">
            <div style="padding:10px; color: var(--accent); font-size: 12px; border-bottom: 1px solid var(--border)">WORSHIP TOOLS</div>
            <div style="padding:15px; display:flex; flex-direction:column; gap:15px;">
                <div>
                    <div style="font-size:10px; color:#aaa; margin-bottom:5px;">BIBLE LOOKUP</div>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="bible-ref" placeholder="John 3:16">
                        <button class="btn" onclick="Studio.fetchBibleVerse(document.getElementById('bible-ref').value)">GO</button>
                    </div>
                </div>
                <div>
                    <div style="font-size:10px; color:#aaa; margin-bottom:5px;">HYMNALS</div>
                    <button class="btn" style="width:100%" onclick="Studio.loadHymnFile()">📄 LOAD TXT FILE</button>
                </div>
                <button class="btn" onclick="Studio.gfx.clear()" style="color:var(--live)">✕ CLEAR SCREEN</button>
            </div>
        </div>
    </main>

    <footer>
        <button class="btn" onclick="Studio.uploadOverlay()">🖼 LOGO OVERLAY</button>
        <button class="btn" onclick="Studio.inviteGuest()">+ INVITE GUEST</button>
        <button class="btn" onclick="Studio.setChromaKey(true)">🟢 GREEN SCREEN ON</button>
        <button class="btn" onclick="Studio.setChromaKey(false)">⚪ OFF</button>
    </footer>

    <script type="module">
        import './src/main.js';
        window.addEventListener('load', () => {
            const canvas = document.getElementById('main-canvas');
            if (window.Studio) window.Studio.init(canvas);
        });
    </script>

</html>
