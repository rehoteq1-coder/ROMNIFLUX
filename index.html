<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.OMNIFLUX TITAN | Elite Switcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020408; --surface: #0a0c14; --accent: #00d4ff; --live: #ff2d55; --prv: #30d158; --border: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; display: grid; grid-template-rows: 50px 1fr 140px; height: 100vh; }
        
        header { background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-weight: 700; letter-spacing: 2px; }
        
        main { display: grid; grid-template-columns: 200px 1fr; gap: 1px; background: var(--border); }
        .panel { background: var(--surface); padding: 15px; overflow-y: auto; }
        
        /* THE TITAN MONITOR */
        .monitor-container { background: #000; display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; }
        #main-canvas { width: 100%; height: auto; aspect-ratio: 16/9; background: #050505; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* SWITCHER ENGINE UI */
        footer { background: #000; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        .bus-row { display: flex; gap: 5px; padding: 10px; justify-content: center; align-items: center; }
        .btn-input { width: 70px; height: 50px; background: #1a1d26; border: 1px solid #333; color: #fff; cursor: pointer; font-family: 'Orbitron'; font-size: 14px; transition: 0.2s; }
        
        .btn-input.active-pgm { background: var(--live); border-color: var(--live); box-shadow: 0 0 15px rgba(255,45,85,0.4); }
        .btn-input.active-prv { background: var(--prv); border-color: var(--prv); color: #000; }
        
        .take-btn { width: 120px; height: 60px; background: #222; border: 2px solid var(--accent); color: var(--accent); font-family: 'Orbitron'; cursor: pointer; font-weight: bold; }
        .take-btn:active { background: var(--accent); color: #000; }

        .btn { background: #1a1d26; border: 1px solid var(--border); color: #fff; padding: 10px; width: 100%; cursor: pointer; font-size: 11px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">R.OMNIFLUX <span style="color:#fff">TITAN</span></div>
        <div style="flex:1"></div>
        <button class="btn" style="width:auto; border-color:var(--live); color:var(--live)" onclick="Studio.toggleRecord()">⏺ REC TO DISK</button>
    </header>

    <main>
        <div class="panel">
            <div style="font-size:10px; color:var(--accent); letter-spacing:1px; margin-bottom:15px;">HARDWARE INPUTS</div>
            <button class="btn" onclick="Studio.activateInput(0)">+ CONFIGURE CAM 1</button>
            <button class="btn" onclick="Studio.activateInput(1)">+ CONFIGURE CAM 2</button>
            <button class="btn" onclick="Studio.activateInput(2)">+ CONFIGURE CAM 3</button>
            <button class="btn" onclick="Studio.activateInput(3)">+ CONFIGURE CAM 4</button>
            
            <div style="font-size:10px; color:var(--accent); letter-spacing:1px; margin-top:25px; margin-bottom:10px;">BIBLE & OVERLAYS</div>
            <input type="text" id="bible-ref" placeholder="John 3:16">
            <button class="btn" onclick="Studio.fetchBible(document.getElementById('bible-ref').value)">SEND TO PGM</button>
            <button class="btn" style="color:var(--live)" onclick="Studio.clearGfx()">CLEAR ALL</button>
        </div>

        <div class="monitor-container">
            <canvas id="main-canvas"></canvas>
        </div>
    </main>

    <footer>
        <div class="bus-row">
            <div style="font-size:10px; color:#444; margin-right:10px;">PROGRAM</div>
            <button class="btn-input" id="pgm-0" onclick="Studio.setBus('pgm', 0)">1</button>
            <button class="btn-input" id="pgm-1" onclick="Studio.setBus('pgm', 1)">2</button>
            <button class="btn-input" id="pgm-2" onclick="Studio.setBus('pgm', 2)">3</button>
            <button class="btn-input" id="pgm-3" onclick="Studio.setBus('pgm', 3)">4</button>

            <div style="width:40px;"></div>
            <button class="take-btn" onclick="Studio.take()">CUT</button>
            <div style="width:40px;"></div>

            <div style="font-size:10px; color:#444; margin-right:10px;">PREVIEW</div>
            <button class="btn-input" id="prv-0" onclick="Studio.setBus('prv', 0)">1</button>
            <button class="btn-input" id="prv-1" onclick="Studio.setBus('prv', 1)">2</button>
            <button class="btn-input" id="prv-2" onclick="Studio.setBus('prv', 2)">3</button>
            <button class="btn-input" id="prv-3" onclick="Studio.setBus('prv', 3)">4</button>
        </div>
    </footer>

    <script type="module">
        import './src/main.js';
        window.addEventListener('load', () => {
            const canvas = document.getElementById('main-canvas');
            if (window.Studio) window.Studio.init(canvas);
        });
    </script>
</body>
</html>
