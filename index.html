<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.OMNIFLUX TITAN PRO v9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050a; --surface: #0a0d18; --accent: #00d4ff; --live: #ff2d55; --prv: #30d158; --border: rgba(0,212,255,0.1); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; display: grid; grid-template-rows: 50px 1fr 140px; height: 100vh; }
        header { background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-weight: 700; letter-spacing: 3px; font-size: 1.1rem; }
        main { display: grid; grid-template-columns: 300px 1fr; gap: 1px; background: var(--border); }
        .sidebar { background: var(--surface); display: flex; flex-direction: column; overflow-y: auto; }
        .drawer { border-bottom: 1px solid var(--border); }
        .drawer-head { padding: 12px 15px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; color: var(--accent); }
        .drawer-content { padding: 15px; display: none; flex-direction: column; gap: 8px; }
        .drawer.open .drawer-content { display: flex; }
        .monitor-area { background: #000; display: flex; align-items: center; justify-content: center; position: relative; padding: 10px; }
        #main-canvas { width: 100%; height: auto; aspect-ratio: 16/9; background: #010103; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        footer { background: #000; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        .bus-row { display: flex; flex: 1; gap: 5px; padding: 10px; justify-content: center; align-items: center; }
        .btn-input { width: 55px; height: 45px; background: #111; border: 1px solid #333; color: #fff; cursor: pointer; font-family: 'Orbitron'; font-size: 14px; }
        .btn-input.active-pgm { background: var(--live); border-color: var(--live); box-shadow: 0 0 15px rgba(255,45,85,0.4); }
        .btn-input.active-prv { background: var(--prv); color: #000; }
        .take-btn { width: 110px; height: 60px; background: #1a1d26; border: 2px solid var(--accent); color: var(--accent); font-family: 'Orbitron'; cursor: pointer; font-weight: bold; }
        .btn { background: #1a1d26; border: 1px solid var(--border); color: #fff; padding: 10px; width: 100%; cursor: pointer; font-size: 11px; text-align: left; }
        input, select { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 100%; box-sizing: border-box; font-size: 11px; }
        #qr-box img { width: 120px; height: 120px; margin: 0 auto; display: block; border: 4px solid #fff; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">R.OMNIFLUX <span style="font-weight:100; color:#fff">TITAN v9</span></div>
        <div style="flex:1"></div>
        <button class="btn" style="width:auto; border-color:var(--live); color:var(--live)" id="rec-btn" onclick="Studio.toggleRecord()">⏺ REC TO DISK</button>
    </header>

    <main>
        <div class="sidebar">
            <!-- DRAWER 1: INPUTS -->
            <div class="drawer open">
                <div class="drawer-head" onclick="this.parentElement.classList.toggle('open')">HARDWARE SOURCES <span>▼</span></div>
                <div class="drawer-content">
                    <button class="btn" onclick="Studio.refreshDevices()">🔄 SCAN CAMERAS</button>
                    <select id="device-select"><option>No Cameras Detected</option></select>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                        <button class="btn" onclick="Studio.assignCamera(0)">SET CAM 1</button>
                        <button class="btn" onclick="Studio.assignCamera(1)">SET CAM 2</button>
                        <button class="btn" onclick="Studio.assignCamera(2)">SET CAM 3</button>
                        <button class="btn" onclick="Studio.assignCamera(3)">SET CAM 4</button>
                    </div>
                </div>
            </div>

            <!-- DRAWER 2: PRODUCTION DATA (TITLES) -->
            <div class="drawer">
                <div class="drawer-head" onclick="this.parentElement.classList.toggle('open')">PRODUCTION DATA <span>▼</span></div>
                <div class="drawer-content">
                    <input type="text" id="event-title" placeholder="Event Title (e.g. Sunday Service)">
                    <input type="text" id="speaker-name" placeholder="Speaker / Pastor Name">
                    <button class="btn" onclick="Studio.updateEventInfo()">▶ UPDATE DISPLAY</button>
                    <button class="btn" style="color:var(--live)" onclick="Studio.clearGfx()">✕ CLEAR ALL</button>
                </div>
            </div>

            <!-- DRAWER 3: WORSHIP TOOLS -->
            <div class="drawer">
                <div class="drawer-head" onclick="this.parentElement.classList.toggle('open')">BIBLE & HYMNAL <span>▼</span></div>
                <div class="drawer-content">
                    <input type="text" id="bible-ref" placeholder="Psalm 23:1">
                    <button class="btn" onclick="Studio.fetchBible(document.getElementById('bible-ref').value)">▶ SEND BIBLE</button>
                    <button class="btn" onclick="Studio.loadHymn()">📄 LOAD HYMN FILE</button>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                        <button class="btn" style="text-align:center" onclick="Studio.prevHymnLine()">PREV</button>
                        <button class="btn" style="text-align:center" onclick="Studio.nextHymnLine()">NEXT</button>
                    </div>
                </div>
            </div>

            <!-- DRAWER 4: WIRELESS QR -->
            <div class="drawer">
                <div class="drawer-head" onclick="this.parentElement.classList.toggle('open')">SATELLITE (WIRELESS) <span>▼</span></div>
                <div class="drawer-content">
                    <div id="qr-box" style="text-align:center;">[ GENERATING QR... ]</div>
                    <div style="font-size:9px; color:#888; margin-top:5px; text-align:center;">Scan with smartphone to connect as Cam 2/3/4</div>
                </div>
            </div>
        </div>

        <div class="monitor-area">
            <canvas id="main-canvas"></canvas>
            <div style="position:absolute; top:20px; left:10%; color:var(--prv); font-size:10px; font-family:Orbitron; letter-spacing:2px;">PREVIEW</div>
            <div style="position:absolute; top:20px; right:10%; color:var(--live); font-size:10px; font-family:Orbitron; letter-spacing:2px;">PROGRAM</div>
        </div>
    </main>

    <footer>
        <div class="bus-row">
            <div style="font-size:10px; color:#444; margin-right:15px; font-family:Orbitron;">PGM</div>
            <button class="btn-input" id="pgm-0" onclick="Studio.setBus('pgm', 0)">1</button>
            <button class="btn-input" id="pgm-1" onclick="Studio.setBus('pgm', 1)">2</button>
            <button class="btn-input" id="pgm-2" onclick="Studio.setBus('pgm', 2)">3</button>
            <button class="btn-input" id="pgm-3" onclick="Studio.setBus('pgm', 3)">4</button>
            <div style="width:40px;"></div>
            <button class="take-btn" onclick="Studio.take()">CUT</button>
            <div style="width:40px;"></div>
            <div style="font-size:10px; color:#444; margin-right:15px; font-family:Orbitron;">PRV</div>
            <button class="btn-input" id="prv-0" onclick="Studio.setBus('prv', 0)">1</button>
            <button class="btn-input" id="prv-1" onclick="Studio.setBus('prv', 1)">2</button>
            <button class="btn-input" id="prv-2" onclick="Studio.setBus('prv', 2)">3</button>
            <button class="btn-input" id="prv-3" onclick="Studio.setBus('prv', 3)">4</button>
        </div>
    </footer>

    <script type="module">
        import './src/main.js';
        window.addEventListener('load', () => {
            const canvas = document.getElementById('main-canvas');
            if(window.Studio) window.Studio.init(canvas);
        });
    </script>
</body>
</html>
