<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.OMNIFLUX TITAN | Pro Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050608;
            --surface: #0f1117;
            --accent: #00d4ff;
            --live: #ff2d55;
            --border: rgba(255,255,255,0.08);
        }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Rajdhani', sans-serif; overflow: hidden;
            display: grid; grid-template-rows: 60px 1fr 120px; height: 100vh;
        }
        header {
            background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 25px; gap: 20px;
        }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-weight: 700; letter-spacing: 3px; font-size: 1.2rem; }
        
        main {
            display: grid; grid-template-columns: 260px 1fr 300px; gap: 1px;
            background: var(--border);
        }
        .panel { background: var(--surface); position: relative; overflow: hidden; }
        
        .monitor-frame {
            background: #000; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        #main-canvas {
            width: 100%; height: auto; max-height: 100%;
            aspect-ratio: 16/9; box-shadow: 0 0 100px rgba(0,0,0,0.8);
            background: #020205;
        }

        .btn {
            background: #1a1d26; border: 1px solid var(--border); color: #fff;
            padding: 12px 20px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron';
            font-size: 10px; letter-spacing: 1px; transition: 0.3s;
        }
        .btn:hover { border-color: var(--accent); background: rgba(0,212,255,0.1); }
        .btn-live { background: var(--live); border: none; font-weight: bold; }

        footer {
            background: #000; border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        
        .stat-bar { font-family: monospace; font-size: 10px; color: var(--accent); opacity: 0.7; }
    </style>
</head>
<body>

    <header>
        <div class="logo">R.OMNIFLUX <span style="color:#fff">TITAN</span></div>
        <div style="flex:1"></div>
        <div class="stat-bar">ENGINE: WEBGL2 MULTITHREADED | 60FPS</div>
        <button class="btn btn-live" onclick="Studio.addSource()">+ ACTIVATE SOURCE</button>
    </header>

    <main>
        <!-- LEFT: SOURCES -->
        <div class="panel">
            <div style="padding:15px; color: var(--accent); font-size: 11px; letter-spacing: 2px; border-bottom: 1px solid var(--border)">INPUT BUS</div>
            <div id="source-list"></div>
        </div>

        <!-- CENTER: MONITOR -->
        <div class="panel monitor-frame">
            <canvas id="main-canvas"></canvas>
        </div>

        <!-- RIGHT: TOOLS -->
        <div class="panel">
            <div style="padding:15px; color: var(--accent); font-size: 11px; letter-spacing: 2px; border-bottom: 1px solid var(--border)">OUTPUT TOOLS</div>
            <div style="padding:20px; display:flex; flex-direction:column; gap:15px;">
                <button class="btn" onclick="alert('Bible API v3 Active')">BIBLE OVERLAY</button>
                <button class="btn" onclick="alert('Hymnal Module Ready')">HYMN LOADER</button>
                <button class="btn" style="color:var(--live); border-color:var(--live)" onclick="alert('GFX Cleared')">CLEAR ALL</button>
            </div>
        </div>
    </main>

    <footer>
        <button class="btn">CHROMA KEY</button>
        <button class="btn">MULTI-VIEW</button>
        <button class="btn">STREAM SETTINGS</button>
        <button class="btn">RECORD TO DISK</button>
    </footer>

    <script type="module">
        import './src/main.js';
        window.addEventListener('load', () => {
            const canvas = document.getElementById('main-canvas');
            if (window.Studio) {
                window.Studio.init(canvas);
            }
        });
    </script>

</html>
