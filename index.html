<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.OMNIFLUX PRO | Sunday Rescue</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050608; color: #fff; font-family: 'Rajdhani', sans-serif; }
        /* BLUE BORDER PROOF: If you see this, the NEW code is working */
        #studio-wrap { border: 4px solid #00d4ff; height: 100vh; display: grid; grid-template-rows: 50px 1fr 100px; box-sizing: border-box; }
        header { background: #000; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #333; }
        main { display: grid; grid-template-columns: 200px 1fr 200px; gap: 2px; background: #222; }
        .panel { background: #0f1117; padding: 10px; }
        #main-canvas { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid #333; }
        .btn { background: #00d4ff; color: #000; border: none; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; }
        .btn-live { background: #ff2d55; color: #fff; }
    </style>
</head>
<body>
    <div id="studio-wrap">
        <header>
            <div style="font-family: 'Orbitron'; color: #00d4ff;">R.OMNIFLUX PRO v3.0</div>
            <button class="btn btn-live" onclick="Studio.addSource()">+ ACTIVATE CAMERA</button>
        </header>
        <main>
            <div class="panel">SOURCES<div id="source-list"></div></div>
            <div class="panel" style="background:#000; display:flex; align-items:center;">
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="panel">
                BIBLE
                <input type="text" id="b-ref" style="width:100%; margin-top:10px;" placeholder="John 3:16">
                <button class="btn" style="width:100%; margin-top:5px;" onclick="Studio.fetchBibleVerse(document.getElementById('b-ref').value)">GO</button>
            </div>
        </main>
        <footer style="display:flex; align-items:center; justify-content:center; background:#000;">
            <button class="btn" onclick="Studio.gfx.clear()">CLEAR OVERLAYS</button>
        </footer>
    </div>

    <!-- REMOVED FIREBASE TO STOP THE ERRORS -->
    <script type="module">
        import './src/main.js';
        window.addEventListener('load', () => {
            const canvas = document.getElementById('main-canvas');
            if(window.Studio) window.Studio.init(canvas);
        });
    </script>
</body>
</html>
